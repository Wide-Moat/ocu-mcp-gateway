#
# Mirrors the sibling ocu-control security.yml: SHA-pinned actions (40-char),
# binary-pinned scanners (the scanner image/version is pinned, not just the
# action ref — a SHA-pinned action whose `version` input defaults to "latest"
# still runs a floating image). Copy THIS pattern, never a movable-tag docs-lint.
name: security

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lexicon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: naming denylist
        # The project keeps a denylist of terms that must not appear in the
        # tree (working names, third-party naming). The list is maintained as
        # a repository secret so the denied terms are not themselves published.
        # On forks (no secret) the job passes with a notice; the gate is
        # enforced on this repository's own PRs and pushes.
        env:
          DENYLIST: ${{ secrets.LEXICON_DENYLIST }}
        run: |
          set -euo pipefail
          if [ -z "${DENYLIST:-}" ]; then
            echo "::notice::LEXICON_DENYLIST not configured in this context; skipping"
            exit 0
          fi
          # grep exit codes: 0 = hit (fail the gate), 1 = clean, >=2 = grep
          # itself errored (malformed pattern, read error) -- a broken gate
          # must fail loud, never pass as clean.
          rc=0
          hits=$(grep -rniE "$DENYLIST" --exclude-dir='.git' . 2>/tmp/grep-err) || rc=$?
          if [ "$rc" -ge 2 ]; then
            cat /tmp/grep-err >&2
            echo "::error::lexicon grep failed (rc=$rc) -- fix the denylist pattern; failing closed"
            exit 1
          fi
          if [ "$rc" -eq 0 ]; then
            echo "$hits" | sed -E 's/^([^:]+:[0-9]+).*/\1: denied term/'
            echo "::error::denied term found -- see the project lexicon policy"
            exit 1
          fi
          echo "lexicon clean"

  secrets-gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      # The gitleaks GitHub Action requires a paid org licence; the OSS docker
      # image does not. Pin the IMAGE TAG (the scanner binary), not just an action
      # SHA. The repo config (.gitleaks.toml) adds the sk-ocu- caller-key rule so a
      # leaked gateway caller key fails this gate.
      - name: gitleaks (docker, repo ruleset)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 \
            detect --source=/repo --config=/repo/.gitleaks.toml --redact --no-banner

  secrets-trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      # Pin the scanner IMAGE BY DIGEST, mirroring the gitleaks job's direct
      # `docker run` (fleet SHA-pin discipline, #71). The trufflehog GitHub Action
      # can only pin the image by TAG — it builds `trufflehog:${version}` — and a
      # tag floats: firsthand, the `3.95.5` tag's image reports trufflehog_version
      # 3.95.8 in its scan metadata, so the tag alone does not freeze the binary.
      # A digest (@sha256:...) does. We run the pinned image directly and
      # reproduce the action's own command (git scan of the full checked-out
      # history, --fail so a finding reds the job, --no-verification so a detected
      # secret blocks without a live network call).
      - name: trufflehog (docker, digest-pinned)
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            ghcr.io/trufflesecurity/trufflehog@sha256:56c25710275c4b8d74c4f1346a5e7c606fa7ff4afe996f680b288d0fae3fcd9c \
            git file:///repo/ --fail --no-update --no-verification

  sast-semgrep:
    runs-on: ubuntu-latest
    container:
      # Pin the scanner image to a versioned tag, not the movable `semgrep/semgrep`
      # (which floats to latest). A version tag makes the scan reproducible; a full
      # digest pin (sha256:...) is the stronger form and is tracked to land once a
      # verified pull is available in CI (see ISSUE: pin semgrep image by digest).
      image: semgrep/semgrep:1.96.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: semgrep
        run: |
          semgrep ci --sarif --output=semgrep.sarif || true
          semgrep ci
        env:
          SEMGREP_RULES: >-
            p/security-audit p/owasp-top-ten p/golang
            p/github-actions p/secrets
          SEMGREP_SUPPRESS_ERRORS: "false"
      - name: upload semgrep SARIF to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  sca-trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: trivy filesystem — CRITICAL+HIGH blocks
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # CRITICAL,HIGH — harmonised with the sibling webui/admin gates (fleet
          # #64/#65): a HIGH supply-chain vuln (e.g. an access-restriction bypass)
          # must block merge, not just a CRITICAL. A HIGH that is genuinely
          # unexploitable in this component is tracked in .trivyignore with a CVE
          # id, a justification, and a review date — never silenced blindly.
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: "false"

  sca-trivy-image:
    # Scan the SHIPPED container image, not just the source tree: a CVE can enter
    # through the distroless base layer or the compiled Go binary that a filesystem
    # scan of the repo does not see. The image is built from the repo Dockerfile
    # (both bases digest-pinned) and scanned at the same CRITICAL,HIGH floor as the
    # filesystem gate, so a vulnerable base bump reds the merge.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: build the image
        run: docker build -t ocu-mcp-gateway:scan .
      - name: trivy image — CRITICAL+HIGH blocks
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ocu-mcp-gateway:scan
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: "false"

  iac-policy:
    # Invariant #4 NETWORK half (NFR-SEC-52): the rendered deploy manifests grant
    # the gateway NO network route to the operator ingress on either shelf. The
    # self-test runs FIRST as a two-sided red-probe — it proves the gate goes RED
    # when an operator route is planted, so a green main run is not a silent no-op.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: install PyYAML (pinned)
        run: pip install 'PyYAML==6.0.2'
      - name: iac-policy red-probe (RED-when-neutered, two-sided)
        run: python3 scripts/iac_policy_check.py --self-test
      - name: iac-policy gate (no gateway->operator route)
        run: python3 scripts/iac_policy_check.py

  vendored-integrity:
    # Byte-equality gate: every vendored canon artifact still hashes to the blob
    # OID recorded in VENDORED.md, so a silent local mutation of a frozen contract
    # reds CI. The self-test runs FIRST (two-sided): it proves a tampered file
    # changes the OID, so a green run is not a silent no-op. stdlib only (no pip).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: vendored-check red-probe (RED-when-tampered, two-sided)
        run: python3 scripts/vendored_check.py --self-test
      - name: vendored-check gate (vendored copies match recorded blob OIDs)
        run: python3 scripts/vendored_check.py

  conventional-commits:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

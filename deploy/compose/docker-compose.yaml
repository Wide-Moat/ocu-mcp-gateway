#
# Minimal-shelf Compose topology for the MCP gateway (component-01) — the NETWORK
# half of invariant #4 (NFR-SEC-52) expressed as Compose network membership: the
# gateway is attached to the agent-facing and session networks ONLY, NEVER to the
# operator network where the kill-switch/denylist/lifecycle ingress lives. There
# is no co-location and no shared network granting gateway→operator reachability.
#
# The IaC-policy CI gate (scripts/iac_policy_check.py) parses this file and FAILS
# if the gateway service joins the operator network. Red-probe: add
# `ocu-operator-net` to the gateway's networks and the gate goes RED.
services:
  ocu-mcp-gateway:
    image: ghcr.io/wide-moat/ocu-mcp-gateway:latest
    command:
      - -listen=0.0.0.0:8080
      - -boot-set=/etc/ocu/mcp-keys/boot-set.json
      # The deployment scope; the mounted boot-set must be homogeneous and equal
      # to it (a foreign-deployment record boot-rejects the whole set, ADR-0027).
      - -deployment=ocu-dev
      - -service-identity=ocu-mcp-gateway
      # F5 guarded construction (§III): the gateway's own service credential and
      # the deployment provisioning policy are always required; a configured
      # -control-url additionally requires the mTLS-1.3 client material
      # (NFR-SEC-37 — endpoint-without-mTLS refuses at boot).
      - -service-credential-file=/etc/ocu/service-credential/token
      - -provisioning-policy=/etc/ocu/provisioning/policy.json
      - -control-url=https://ocu-control:8443
      - -control-ca=/etc/ocu/f5-mtls/ca.pem
      - -control-client-cert=/etc/ocu/f5-mtls/client.pem
      - -control-client-key=/etc/ocu/f5-mtls/client-key.pem
      - -conn-ceiling=64
    volumes:
      # The Control-owned, root-owned hashed boot-set (salted SHA-256 only,
      # never plaintext). Mounted read-only.
      - type: bind
        source: ./mcp-keys
        target: /etc/ocu/mcp-keys
        read_only: true
      # The gateway's host-side F5 service credential (the Generic internal
      # token, NFR-SEC-26). Root-owned, mounted read-only, rotated in place
      # (the daemon re-reads it per presentation).
      - type: bind
        source: ./service-credential
        target: /etc/ocu/service-credential
        read_only: true
      # The deployment provisioning policy (workload trust profile, mount
      # intent, egress policy, resource caps — CONSTITUTION §III: provisioning
      # comes strictly from deployment config, never a caller body).
      - type: bind
        source: ./provisioning
        target: /etc/ocu/provisioning
        read_only: true
      # The F5 mTLS-1.3 client material (minimal shelf: the auto-generated
      # self-signed CA substrate).
      - type: bind
        source: ./f5-mtls
        target: /etc/ocu/f5-mtls
        read_only: true
    networks:
      # Agent-facing: inbound MCP tool-calls (F1).
      - ocu-agent-net
      # Session: F5 forward to the Control SESSION API (not the operator ingress).
      - ocu-session-net
      # NOTE: ocu-operator-net is intentionally ABSENT. The gateway must never
      # reach the operator ingress (NFR-SEC-52). The IaC gate asserts this.
    depends_on:
      - ocu-control
    restart: unless-stopped

  ocu-control:
    image: ghcr.io/wide-moat/ocu-control:latest
    networks:
      # Control sits on the session network (its session API, reachable by the
      # gateway) AND the operator network (its operator ingress, NOT reachable by
      # the gateway because the gateway is not on ocu-operator-net).
      - ocu-session-net
      - ocu-operator-net
    restart: unless-stopped

networks:
  # Agent-facing ingress network.
  ocu-agent-net:
    driver: bridge
  # Session-request network (F5): gateway ↔ Control session API.
  ocu-session-net:
    driver: bridge
    internal: true
  # Operator network: the kill-switch/denylist/lifecycle ingress lives here. The
  # gateway is NOT a member, so it has no L3 route to the operator ingress.
  ocu-operator-net:
    driver: bridge
    internal: true
